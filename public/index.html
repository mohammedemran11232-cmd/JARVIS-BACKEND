<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J.A.R.V.I.S.</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;color:#00d4ff;font-family:'Share Tech Mono',monospace;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
#app{width:100%;height:100vh;background:radial-gradient(ellipse at center,#001a2e 0%,#000508 60%,#000 100%);display:flex;flex-direction:column;position:relative;overflow:hidden;}
.ring{position:absolute;border-radius:50%;border:1px solid rgba(0,212,255,0.07);top:50%;left:50%;transform:translate(-50%,-50%);animation:spin linear infinite;pointer-events:none;}
.r1{width:900px;height:900px;animation-duration:40s;}
.r2{width:650px;height:650px;animation-duration:25s;animation-direction:reverse;border-style:dashed;}
.r3{width:400px;height:400px;animation-duration:15s;}
@keyframes spin{from{transform:translate(-50%,-50%) rotate(0deg);}to{transform:translate(-50%,-50%) rotate(360deg);}}
.corner{position:absolute;width:20px;height:20px;pointer-events:none;z-index:20;}
.ctl{top:10px;left:10px;border-top:1px solid rgba(0,212,255,0.5);border-left:1px solid rgba(0,212,255,0.5);}
.ctr{top:10px;right:10px;border-top:1px solid rgba(0,212,255,0.5);border-right:1px solid rgba(0,212,255,0.5);}
.cbl{bottom:10px;left:10px;border-bottom:1px solid rgba(0,212,255,0.5);border-left:1px solid rgba(0,212,255,0.5);}
.cbr{bottom:10px;right:10px;border-bottom:1px solid rgba(0,212,255,0.5);border-right:1px solid rgba(0,212,255,0.5);}
#header{position:relative;z-index:10;padding:16px 24px 12px;border-bottom:1px solid rgba(0,212,255,0.15);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
#header h1{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;letter-spacing:6px;color:#00d4ff;}
.dot{width:7px;height:7px;border-radius:50%;background:#00ff88;display:inline-block;margin-right:6px;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
.status{font-size:10px;letter-spacing:3px;color:rgba(0,212,255,0.5);display:flex;align-items:center;}
#quickbar{position:relative;z-index:10;display:flex;gap:8px;padding:10px 24px;border-bottom:1px solid rgba(0,212,255,0.1);flex-wrap:wrap;flex-shrink:0;}
.qb{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;color:rgba(0,212,255,0.6);background:rgba(0,212,255,0.04);border:1px solid rgba(0,212,255,0.15);padding:5px 12px;cursor:pointer;transition:all 0.2s;text-transform:uppercase;}
.qb:hover{background:rgba(0,212,255,0.12);border-color:rgba(0,212,255,0.5);color:#00d4ff;}
#chat{flex:1;overflow-y:auto;padding:16px 24px;position:relative;z-index:10;scroll-behavior:smooth;}
#chat::-webkit-scrollbar{width:3px;}
#chat::-webkit-scrollbar-thumb{background:rgba(0,212,255,0.25);}
.msg{margin-bottom:14px;animation:fadein 0.3s ease;}
@keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.lbl{font-size:9px;letter-spacing:2px;opacity:0.45;margin-bottom:3px;}
.user .lbl{color:#ff9500;text-align:right;}
.jarvis .lbl{color:#00d4ff;}
.bub{padding:10px 14px;font-size:13px;line-height:1.65;white-space:pre-wrap;}
.user .bub{background:rgba(255,149,0,0.07);border:1px solid rgba(255,149,0,0.18);color:rgba(255,200,100,0.9);text-align:right;margin-left:80px;}
.jarvis .bub{background:rgba(0,212,255,0.04);border:1px solid rgba(0,212,255,0.18);border-left:2px solid rgba(0,212,255,0.55);color:rgba(180,240,255,0.9);margin-right:80px;}
.thinking{display:flex;gap:5px;align-items:center;padding:10px 14px;margin-right:80px;border-left:2px solid rgba(0,212,255,0.4);border:1px solid rgba(0,212,255,0.15);}
.thinking span{width:5px;height:5px;border-radius:50%;background:rgba(0,212,255,0.55);animation:blink 1.2s ease-in-out infinite;}
.thinking span:nth-child(2){animation-delay:0.2s;}
.thinking span:nth-child(3){animation-delay:0.4s;}
@keyframes blink{0%,80%,100%{opacity:0.2;transform:scale(0.8);}40%{opacity:1;transform:scale(1);}}
#inputbar{position:relative;z-index:10;padding:12px 24px 16px;border-top:1px solid rgba(0,212,255,0.15);display:flex;gap:10px;flex-shrink:0;align-items:center;}
#inp{flex:1;background:rgba(0,212,255,0.04);border:1px solid rgba(0,212,255,0.22);color:#00d4ff;font-family:'Share Tech Mono',monospace;font-size:13px;padding:10px 14px;outline:none;transition:all 0.2s;}
#inp::placeholder{color:rgba(0,212,255,0.28);}
#inp:focus{border-color:rgba(0,212,255,0.55);background:rgba(0,212,255,0.07);}
#btn{font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;color:#000;background:#00d4ff;border:none;padding:10px 20px;cursor:pointer;transition:all 0.2s;}
#btn:hover{background:#00ffff;}
#btn:disabled{background:rgba(0,212,255,0.18);color:rgba(0,212,255,0.35);cursor:not-allowed;}
#micbtn{width:44px;height:44px;border-radius:50%;background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.3);color:#00d4ff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0;}
#micbtn:hover{background:rgba(0,212,255,0.18);border-color:#00d4ff;}
#micbtn.listening{background:rgba(255,50,50,0.2);border-color:#ff3232;color:#ff3232;animation:micpulse 1s ease-in-out infinite;}
@keyframes micpulse{0%,100%{box-shadow:0 0 0 0 rgba(255,50,50,0.4);}50%{box-shadow:0 0 0 8px rgba(255,50,50,0);}}
</style>
</head>
<body>
<div id="app">
  <div class="ring r1"></div>
  <div class="ring r2"></div>
  <div class="ring r3"></div>
  <div class="corner ctl"></div><div class="corner ctr"></div>
  <div class="corner cbl"></div><div class="corner cbr"></div>
  <div id="header">
    <h1>J.A.R.V.I.S.</h1>
    <div class="status"><span class="dot"></span>SYSTEMS ONLINE</div>
  </div>
  <div id="quickbar">
    <button class="qb" onclick="q('Draft an email for me')">✉ EMAIL</button>
    <button class="qb" onclick="q('Help me plan my day')">◈ PLAN DAY</button>
    <button class="qb" onclick="q('Add a task to my to-do list')">◻ TO-DO</button>
    <button class="qb" onclick="q('Search the web for something')">⊕ SEARCH</button>
    <button class="qb" onclick="q('Give me advice on something')">◆ ADVICE</button>
    <button class="qb" onclick="q('Start a new project with me')">⬡ PROJECT</button>
    <button class="qb" onclick="q('Write a text message for me')">✆ TEXT</button>
  </div>
  <div id="chat">
    <div class="msg jarvis">
      <div class="lbl">J.A.R.V.I.S. // BOOT</div>
      <div class="bub">Good day, sir. All systems are fully operational. You may speak or type your commands. I'm ready.</div>
    </div>
  </div>
  <div id="inputbar">
    <button id="micbtn" onclick="toggleMic()" title="Click to speak">🎤</button>
    <input id="inp" type="text" placeholder="SPEAK YOUR COMMAND, SIR..." autocomplete="off"/>
    <button id="btn" onclick="send()">EXECUTE</button>
  </div>
</div>
<script>
var chatHistory=[];
var busy=false;
var recognition=null;
var listening=false;
var VOICE_ID='onwK4e9ZLuTAKqWW03F9'; 

function q(t){document.getElementById('inp').value=t;send();}

function toggleMic(){
  if(!(window.SpeechRecognition||window.webkitSpeechRecognition)){
    alert('Please use Chrome for voice support.');
    return;
  }
  if(listening){recognition.stop();return;}
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();
  recognition.lang='en-US';
  recognition.interimResults=false;
  recognition.maxAlternatives=1;
  recognition.onstart=function(){
    listening=true;
    document.getElementById('micbtn').classList.add('listening');
    document.getElementById('micbtn').textContent='🔴';
  };
  recognition.onresult=function(e){
    var transcript=e.results[0][0].transcript;
    document.getElementById('inp').value=transcript;
    send();
  };
  recognition.onerror=function(){
    listening=false;
    document.getElementById('micbtn').classList.remove('listening');
    document.getElementById('micbtn').textContent='🎤';
  };
  recognition.onend=function(){
    listening=false;
    document.getElementById('micbtn').classList.remove('listening');
    document.getElementById('micbtn').textContent='🎤';
  };
  recognition.start();
}

function speak(text){
  fetch('/api/speak',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({text:text.replace(/[*#_`]/g,''),voiceId:VOICE_ID})
  }).then(function(r){
    if(!r.ok){console.error('Speak error',r.status);return null;}
    return r.blob();
  }).then(function(blob){
    if(!blob)return;
    var url=URL.createObjectURL(blob);
    var audio=new Audio(url);
    audio.play().catch(function(e){console.error('Play error',e);});
  }).catch(function(e){console.error('Voice error',e);});
}

function send(){
  if(busy)return;
  var inp=document.getElementById('inp');
  var txt=inp.value.trim();
  if(!txt)return;
  inp.value='';
  addMsg('user',txt);
  chatHistory.push({role:'user',content:txt});
  busy=true;
  document.getElementById('btn').disabled=true;
  var chat=document.getElementById('chat');
  var tEl=document.createElement('div');
  tEl.className='msg jarvis';
  tEl.innerHTML='<div class="lbl">J.A.R.V.I.S. // PROCESSING</div><div class="thinking"><span></span><span></span><span></span></div>';
  chat.appendChild(tEl);
  chat.scrollTop=chat.scrollHeight;
  fetch('/api/message',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({message:txt})
  }).then(function(r){return r.json();})
  .then(function(data){
    var reply=data.message||'JARVIS encountered an anomaly. Standing by.';
    chatHistory.push({role:'assistant',content:reply});
    tEl.remove();
    addMsg('jarvis',reply);
    speak(reply);
    busy=false;
    document.getElementById('btn').disabled=false;
  }).catch(function(){
    tEl.remove();
    addMsg('jarvis','Connection anomaly detected, sir. Please try again.');
    busy=false;
    document.getElementById('btn').disabled=false;
  });
}

function addMsg(role,text){
  var chat=document.getElementById('chat');
  var el=document.createElement('div');
  el.className='msg '+role;
  var lbl=role==='user'?'YOU // INPUT':'J.A.R.V.I.S. // RESPONSE';
  el.innerHTML='<div class="lbl">'+lbl+'</div><div class="bub">'+text.replace(/</g,'&lt;')+'</div>';
  chat.appendChild(el);
  chat.scrollTop=chat.scrollHeight;
}

document.getElementById('inp').addEventListener('keydown',function(e){if(e.key==='Enter')send();});
</script>
</body>
</html>
